  <line x1="265" y1="184" x2="230" y2="206" stroke="#ddd" stroke-width="0.8"/>
  <rect x="200" y="206" width="160" height="26" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
