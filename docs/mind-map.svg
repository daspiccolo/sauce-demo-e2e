  <line x1="565" y1="184" x2="530" y2="274" stroke="#ddd" stroke-width="0.8"/>
  <rect x="510" y="274" width="170" height="26" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="595" y="291" text-anchor="middle" font-size="11" fill="#854F0B">○ Remove from cart · P2</text>

  <line x1="565" y1="184" x2="530" y2="308" stroke="#ddd" stroke-width="0.8"/>
  <rect x="510" y="308" width="170" height="26" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="595" y="325" text-anchor="middle" font-size="11" fill="#085041">△ Cart state after removal · P3</text>

  <!-- ── CHECKOUT ── -->
