  <line x1="745" y1="184" x2="710" y2="206" stroke="#ddd" stroke-width="0.8"/>
  <rect x="690" y="206" width="180" height="26" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
