<svg width="900" height="780" viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="780" fill="#ffffff" rx="12"/>

  <!-- Legend -->
  <rect x="30" y="16" width="14" height="14" rx="3" fill="#E24B4A"/>
  <text x="50" y="27" font-size="12" fill="#444">P1 — critical</text>
  <rect x="160" y="16" width="14" height="14" rx="3" fill="#BA7517"/>
  <text x="180" y="27" font-size="12" fill="#444">P2 — important</text>
  <rect x="310" y="16" width="14" height="14" rx="3" fill="#0F6E56"/>
  <text x="330" y="27" font-size="12" fill="#444">P3 — complementary</text>

  <!-- CENTER -->
  <rect x="310" y="44" width="280" height="44" rx="10" fill="#7F77DD" stroke="#534AB7" stroke-width="1"/>
  <text x="450" y="71" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SauceDemo E2E Testing</text>

  <!-- ── LOGIN ── -->
  <line x1="360" y1="88" x2="120" y2="148" stroke="#aaa" stroke-width="1.2"/>
  <rect x="30" y="148" width="180" height="36" rx="8" fill="#E24B4A" stroke="#A32D2D" stroke-width="1"/>
  <text x="120" y="171" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Login</text>

  <line x1="90" y1="184" x2="60" y2="206" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="206" width="160" height="26" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="110" y="223" text-anchor="middle" font-size="11" fill="#A32D2D">✓ Valid login · P1</text>

  <line x1="90" y1="184" x2="60" y2="240" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="240" width="160" height="26" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="110" y="257" text-anchor="middle" font-size="11" fill="#A32D2D">✓ Invalid login · P1</text>

  <line x1="90" y1="184" x2="60" y2="274" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="274" width="160" height="26" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="110" y="291" text-anchor="middle" font-size="11" fill="#854F0B">○ Empty username · P2</text>

  <line x1="90" y1="184" x2="60" y2="308" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="308" width="160" height="26" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="110" y="325" text-anchor="middle" font-size="11" fill="#854F0B">○ Empty password · P2</text>

  <line x1="90" y1="184" x2="60" y2="342" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="342" width="160" height="26" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="110" y="359" text-anchor="middle" font-size="11" fill="#854F0B">○ Error message · P2</text>

