  <line x1="565" y1="184" x2="530" y2="206" stroke="#ddd" stroke-width="0.8"/>
  <rect x="510" y="206" width="170" height="26" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="595" y="223" text-anchor="middle" font-size="11" fill="#A32D2D">✓ Product in cart · P1</text>

  <line x1="565" y1="184" x2="530" y2="240" stroke="#ddd" stroke-width="0.8"/>
  <rect x="510" y="240" width="170" height="26" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
