  <line x1="500" y1="88" x2="610" y2="148" stroke="#aaa" stroke-width="1.2"/>
  <rect x="510" y="148" width="180" height="36" rx="8" fill="#E24B4A" stroke="#A32D2D" stroke-width="1"/>
