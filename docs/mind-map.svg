  <line x1="265" y1="184" x2="230" y2="342" stroke="#ddd" stroke-width="0.8"/>
  <rect x="200" y="342" width="160" height="26" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="280" y="359" text-anchor="middle" font-size="11" fill="#085041">△ Sort Z-A · P3</text>

